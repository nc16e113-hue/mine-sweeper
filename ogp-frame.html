<!doctype html>
<html lang="ja"><head><meta charset="utf-8">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:1200px;height:630px;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic","Segoe UI",sans-serif;}
  .c{width:1200px;height:630px;background:linear-gradient(160deg,#2b3a52 0%,#1b2536 100%);display:flex;align-items:center;justify-content:center;gap:70px;padding:60px;}
  .left{color:#fff;}
  h1{font-size:82px;font-weight:900;line-height:1.15;}
  h1 .m{color:#ff6b6b;}
  .sub{font-size:34px;font-weight:800;color:#a8c0ff;margin-top:22px;}
  .sub2{font-size:26px;font-weight:700;color:#8fa2c0;margin-top:14px;}
  .grid{display:grid;grid-template-columns:repeat(4,86px);grid-template-rows:repeat(4,86px);gap:8px;}
  .cell{border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:44px;font-weight:900;}
  .u{background:#3a4a63;} .o{background:#e9eef7;color:#233043;}
  .n1{color:#2b6ef0;} .n2{color:#2e9e57;} .n3{color:#e0483d;}
  .b{background:#ffdada;}
  .foot{position:absolute;bottom:38px;color:#8fa2c0;font-size:22px;font-weight:700;}
</style></head>
<body>
  <div class="c">
    <div class="left">
      <h1>マイン<br><span class="m">スイーパー</span></h1>
      <div class="sub">無料・登録不要・スマホ対応</div>
      <div class="sub2">3難易度／タイムを競おう ⏱️</div>
    </div>
    <div class="grid">
      <div class="cell o n1">1</div><div class="cell u"></div><div class="cell o n2">2</div><div class="cell o">　</div>
      <div class="cell o n2">2</div><div class="cell b">💣</div><div class="cell o n3">3</div><div class="cell u"></div>
      <div class="cell u"></div><div class="cell o n3">3</div><div class="cell b">💣</div><div class="cell o n2">2</div>
      <div class="cell o">🚩</div><div class="cell o n1">1</div><div class="cell u"></div><div class="cell o n1">1</div>
    </div>
    <div class="foot">「AI CEO」プロジェクト運営</div>
  </div>
</body></html>
